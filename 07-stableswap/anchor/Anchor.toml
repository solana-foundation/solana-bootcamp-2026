[toolchain]
anchor_version = "1.0.0-rc.2"

[features]
resolution = true
skip-lint = false

[programs.localnet]
stableswap = "CorabfeniSyoc4aLcJe7t9b3RaFX5tzVWXdewU1xuA6B"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "cargo test -p stableswap --test litesvm"

[hooks]

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
ledger = ".anchor/test-ledger"
rpc_port = 8899
